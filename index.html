<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra & Mert Düğün Davetiyesi</title>
    <style>
        :root {
            --bg-color: #f4ece1;
            --envelope-color: #cfbda8;
            --envelope-inside: #bfae99;
            --card-color: #ffffff;
            --text-color: #4a4a4a;
            --accent-color: #8c7662;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Arka plan süslemeleri */
        .background-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(207, 189, 168, 0.2);
            filter: blur(20px);
        }
        .circle-1 { width: 300px; height: 300px; top: -100px; left: -100px; }
        .circle-2 { width: 400px; height: 400px; bottom: -150px; right: -150px; }

        /* Kapsayıcı */
        .wrapper {
            position: relative;
            width: 380px;
            height: 500px;
            z-index: 2;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* ZARF */
        .envelope {
            position: absolute;
            width: 100%;
            height: 350px;
            background-color: var(--envelope-color);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            z-index: 3;
            transition: transform 0.5s ease;
        }

        /* Zarfın İç Kısmı */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--envelope-inside);
            border-radius: 0 0 10px 10px;
            clip-path: polygon(0 0, 0% 100%, 100% 100%, 100% 0, 50% 45%);
            z-index: 2;
        }

        /* Zarf Ön Cepleri (Görsel Derinlik İçin) */
        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 4;
        }

        .envelope-front::slide {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
        }

        /* Sol ve Sağ Üçgenler */
        .envelope-front::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #c5b39e;
            clip-path: polygon(0 0, 50% 50%, 0 100%);
            border-radius: 0 0 0 10px;
        }

        .envelope-front::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: #bcab96;
            clip-path: polygon(100% 0, 50% 50%, 100% 100%);
            border-radius: 0 0 10px 0;
        }

        /* Alt Üçgen */
        .envelope-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #b3a18c;
            clip-path: polygon(0 100%, 50% 48%, 100% 100%);
            z-index: 5;
            border-radius: 0 0 10px 10px;
        }

        /* ZARF KAPAĞI */
        .flap {
            position: absolute;
            top: 150px; /* Zarfın üst çizgisine hizalı */
            width: 380px;
            height: 170px;
            background-color: var(--envelope-color);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top;
            transition: transform 0.6s ease, z-index 0.2s ease 0.2s;
            z-index: 6;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }

        /* Zarf Üzerindeki İsim Kilidi (Mühür efekti) */
        .seal {
            position: absolute;
            top: 290px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background-color: var(--accent-color);
            border-radius: 50%;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 7;
            transition: opacity 0.4s ease, transform 0.4s ease;
            font-family: 'Georgia', serif;
        }

        /* DAVETİYE KARTI */
        .card {
            position: absolute;
            width: 350px;
            height: 460px;
            background-color: var(--card-color);
            border-radius: 8px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            z-index: 2;
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateY(0); /* Zarfın içinde gizli */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid #f0e6da;
        }

        /* Kartın İç Tasarımı */
        .card-border {
            border: 1px solid var(--accent-color);
            width: 100%;
            height: 100%;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .names {
            font-family: 'Georgia', serif;
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: italic;
            margin-top: 10px;
        }

        .names span {
            display: block;
            font-size: 1.2rem;
            margin: 5px 0;
            color: var(--text-color);
        }

        .invitation-text {
            font-size: 0.9rem;
            color: var(--text-color);
            line-height: 1.5;
            font-style: italic;
            margin: 15px 0;
        }

        .event-section {
            width: 100%;
            margin-bottom: 10px;
        }

        .event-title {
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            color: var(--accent-color);
            border-bottom: 1px solid var(--envelope-color);
            padding-bottom: 3px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .event-details {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.4;
        }

        /* AKTİF (AÇILMIŞ) DURUMU */
        .wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .wrapper.open .seal {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px) scale(0.8);
            pointer-events: none;
        }

        .wrapper.open .card {
            transform: translateY(-220px);
            z-index: 5;
        }
        
        /* Tıklama İpucu */
        .hint {
            position: absolute;
            bottom: -40px;
            font-size: 0.85rem;
            color: var(--accent-color);
            letter-spacing: 1px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="wrapper" id="invitationWrapper">
        
        <div class="seal">K&M</div>

        <div class="flap"></div>

        <div class="card">
            <div class="card-border">
                <div class="names">
                    Kübra
                    <span>&</span>
                    Mert
                </div>
                
                <p class="invitation-text">
                    Hayatımızın bu en özel gününde <br>sizleri de aramızda görmekten <br>mutluluk duyarız.
                </p>
                
                <div class="event-section">
                    <div class="event-title">Kına Gecesi</div>
                    <div class="event-details">
                        <strong>Tarih:</strong> 03.08.2026<br>
                        <strong>Saat:</strong> 19:00<br>
                        <strong>Yer:</strong> Samtar Davet<br>
                        <small>İstanbul</small>
                    </div>
                </div>
                
                <div class="event-section">
                    <div class="event-title">Düğün</div>
                    <div class="event-details">
                        <strong>Tarih:</strong> 09.08.2026<br>
                        <strong>Saat:</strong> 19:00<br>
                        <strong>Yer:</strong> Taşçı Konağı<br>
                        <small>Erzincan</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="envelope">
            <div class="envelope-front"></div>
            <div class="envelope-bottom"></div>
        </div>

        <div class="hint">Açmak için zarfa dokunun</div>
    </div>

    <script>
        const wrapper = document.getElementById('invitationWrapper');
        
        // Zarfa tıklandığında açılma/kapanma animasyonunu tetikler
        wrapper.addEventListener('click', () => {
            wrapper.classList.toggle('open');
            
            const hint = document.querySelector('.hint');
            if(wrapper.classList.contains('open')) {
                hint.textContent = "Kapatmak için zarfa dokunun";
            } else {
                hint.textContent = "Açmak için zarfa dokunun";
            }
        });
    </script>
</body>
</html>
