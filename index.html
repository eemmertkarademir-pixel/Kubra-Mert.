<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kübra & Mert Davetiye</title>
    <style>
        /* SİZİN ORİJİNAL TASARIMINIZ VE ESKİ DÜZEN */
        body {
            margin: 0;
            padding: 0;
            background-color: #faf6f0;
            font-family: 'Georgia', serif;
            color: #4a4a4a;
            overflow-x: hidden;
        }

        /* Giriş Ekranı (Zarf ve Mühür Bölümü) */
        .envelope-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #f3ede2;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 1.5s ease-in-out;
            background-image: url('https://www.transparenttextures.com/patterns/soft-paper.png');
        }

        .envelope {
            position: relative;
            width: 90%;
            max-width: 450px;
            height: 300px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #dfd5c6;
            cursor: pointer;
            padding: 20px;
            text-align: center;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px dashed #bfa15f;
            border-radius: 8px;
            pointer-events: none;
        }

        .names-title {
            font-size: 2.2rem;
            color: #bfa15f;
            margin-bottom: 5px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
        }

        .invitation-text {
            font-size: 1rem;
            color: #666;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* Mühür Butonu */
        .seal {
            width: 75px;
            height: 75px;
            background: radial-gradient(#cc3333, #990000);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 5px 15px rgba(153,0,0,0.4), inset 0 2px 5px rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            border: 3px solid #b30000;
            transition: transform 0.3s;
            animation: pulse 2s infinite;
        }

        .seal::after {
            content: 'KM';
            font-family: 'Times New Roman', serif;
            letter-spacing: 1px;
        }

        .seal:hover {
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(153,0,0,0.5); }
            70% { box-shadow: 0 0 0 15px rgba(153,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(153,0,0,0); }
        }

        /* Zarfın Yukarı Kayma Efekti */
        .envelope-container.opened {
            transform: translateY(-100vh);
        }

        /* Ana İçerik Alanı */
        .main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Davetiye Kartı Görselleri ve Yapısı */
        .invitation-card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-top: 30px;
            margin-bottom: 30px;
            border: 1px solid #eae1d4;
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Sabit Müzik Butonu */
        .music-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #bfa15f;
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 999;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
        }

        .music-toggle:hover {
            transform: scale(1.1);
        }

        /* YouTube API için Görünmez Katman */
        #youtube-audio-layer {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- SİZİN ORİJİNAL ZARF VE MÜHÜR DÜZENİNİZ -->
    <div class="envelope-container" id="envelopeContainer">
        <div class="envelope" onclick="openInvitation()">
            <div class="names-title">Kübra & Mert</div>
            <div class="invitation-text">Düğün Davetiyemize Hoş Geldiniz</div>
            <div class="seal"></div>
        </div>
    </div>

    <!-- ANA İÇERİK: ESKİ DÜZENDEKİ GİBİ SADECE KART GÖRSELLERİNİZ -->
    <div class="main-content" id="mainContent">
        <div class="invitation-card">
            <!-- Birinci Sayfa Görseliniz -->
            <img src="https://eemmertkarademir-pixel.github.io/Kubra-Mert./1.png" alt="Davetiye Sayfa 1" class="card-image">
        </div>
        
        <div class="invitation-card">
            <!-- İkinci Sayfa Görseliniz -->
            <img src="https://eemmertkarademir-pixel.github.io/Kubra-Mert./2.png" alt="Davetiye Sayfa 2" class="card-image">
        </div>
    </div>

    <!-- Müzik Kontrol Butonu -->
    <button class="music-toggle" id="musicBtn" onclick="toggleMusic()">🎻</button>

    <!-- Arka Planda Gizli Çalışan Oynatıcı -->
    <div id="youtube-audio-layer">
        <div id="player-instance"></div>
    </div>

    <script>
        let player;
        let isPlaying = false;
        let isApiReady = false;

        // YouTube Iframe API Yüklenmesi
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-instance', {
                height: '10',
                width: '10',
                videoId: 'MPhNFTdhG3E', // Seçtiğiniz Keman Fon Müziği
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,
                    'rel': 0,
                    'showinfo': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            isApiReady = true;
        }

        // Zarfı Açma ve Müziği Başlatma Fonksiyonu (Eski düzeni korur)
        function openInvitation() {
            // Zarfı yukarı kaydırarak gizle
            document.getElementById('envelopeContainer').classList.add('opened');
            
            // Ana davetiye kartlarını görünür yap
            document.getElementById('mainContent').classList.add('visible');

            // Arka planda müziği güvenli bir şekilde tetikle
            if (isApiReady && player && typeof player.playVideo === "function") {
                player.playVideo();
                isPlaying = true;
                document.getElementById('musicBtn').innerHTML = "🔇";
            } else {
                // API saliselerle geciktiyse tekrar dene
                setTimeout(() => {
                    if (player && typeof player.playVideo === "function") {
                        player.playVideo();
                        isPlaying = true;
                        document.getElementById('musicBtn').innerHTML = "🔇";
                    }
                }, 400);
            }
        }

        // Müzik Duraklatma / Başlatma
        function toggleMusic() {
            if (player && typeof player.playVideo === "function") {
                if (isPlaying) {
                    player.pauseVideo();
                    document.getElementById('musicBtn').innerHTML = "🎻";
                    isPlaying = false;
                } else {
                    player.playVideo();
                    document.getElementById('musicBtn').innerHTML = "🔇";
                    isPlaying = true;
                }
            }
        }
    </script>
</body>
</html>
